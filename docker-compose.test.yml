# Docker Compose test environment for Zypi × MosaicDB agent fabric integration tests.
#
# Usage:
#   docker compose -f docker-compose.test.yml up --build --abort-on-container-exit
#
# Runs the full fabric test suite (33 tests) against a live Zypi instance.

services:
  zypi:
    build:
      context: .
      dockerfile: Dockerfile
    image: zypi:test
    container_name: zypi-test
    cgroup: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/kvm:/dev/kvm
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - zypi-data:/var/lib/zypi
      - zypi-overlaybd:/mnt/zypi-overlaybd
      - /dev:/dev
      - ./guest-agent/zypi-agent:/opt/zypi/bin/zypi-agent
    environment:
      - ZYPI_DATA_DIR=/var/lib/zypi
      - ZYPI_KERNEL_PATH=/opt/zypi/kernel/vmlinux
      - ZYPI_LOG_LEVEL=info
      - MIX_ENV=prod
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 5s
      timeout: 2s
      retries: 15
      start_period: 30s
    networks:
      - fabric-test

  mosaic-test:
    build:
      context: ../mosaic
      dockerfile: Dockerfile
    image: mosaic:test
    container_name: mosaic-test
    depends_on:
      zypi:
        condition: service_healthy
    environment:
      - MIX_ENV=test
      - FABRIC_ENABLED=true
      - FABRIC_SANDBOX_URL=http://zypi:4000
      - FABRIC_DEFAULT_IMAGE=ubuntu:24.04
      - ZYPI_TEST=true
    volumes:
      - mosaic-shards:/var/lib/mosaic/shards
    command: >
      sh -c "
        echo '=== Pre-warming VMs for fabric tests ===' &&
        curl -s -X POST http://zypi:4000/images/ubuntu:24.04/warm -H 'Content-Type: application/json' -d '{\"count\": 3}' &&
        sleep 15 &&
        echo '=== Running fabric integration tests ===' &&
        mix test --only fabric
      "
    networks:
      - fabric-test

volumes:
  zypi-data:
  zypi-overlaybd:
  mosaic-shards:

networks:
  fabric-test:
    driver: bridge
